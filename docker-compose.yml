version: "3.9"
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: [.env]
    environment:
    - PYTHONPATH=/app
    depends_on: [db, redis, ollama]
  worker:
    build: ./backend
    command: python workers/worker.py
    environment:
    - PYTHONPATH=/app
    depends_on:
      - redis
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sim
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
  redis:
    image: redis:7
    ports: ["6379:6379"]
  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: ["ollama:/root/.ollama"]
    
volumes:
  pgdata:
  ollama:
