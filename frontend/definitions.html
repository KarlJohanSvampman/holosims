<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Holosims Definitions Studio</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #1b1f24;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

body {
  display: grid;
  grid-template-columns: 340px 1fr 420px;
}

/* LEFT SIDEBAR */

#sidebar {
  background: #252b33;
  border-right: 1px solid #444;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebarHeader {
  padding: 12px;
  border-bottom: 1px solid #444;
  background: #1d2229;
}

#sidebarHeader h2 {
  margin: 0 0 8px 0;
  font-size: 18px;
}

#tabs {
  display: flex;
  flex-wrap: wrap;
  border-bottom: 1px solid #444;
}

.tab {
  padding: 9px;
  cursor: pointer;
  background: #2e3640;
  border-right: 1px solid #444;
  border-bottom: 1px solid #444;
  font-size: 12px;
}

.tab.active {
  background: #4a5665;
}

#templateActions {
  padding: 10px;
  border-bottom: 1px solid #444;
}

#templateList {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.templateRow {
  padding: 8px;
  margin-bottom: 5px;
  background: #333;
  cursor: pointer;
  border: 1px solid transparent;
}

.templateRow:hover {
  background: #444;
}

.templateRow.active {
  border-color: #8ab4ff;
  background: #3d4754;
}

/* CENTER EDITOR */

#editorPanel {
  background: #20242a;
  padding: 14px;
  overflow-y: auto;
}

#editorTitle {
  margin-top: 0;
}

#jsonEditor {
  width: calc(100% - 22px);
  height: calc(100vh - 140px);
  background: #111;
  color: #00ff99;
  border: 1px solid #444;
  padding: 10px;
  font-family: monospace;
  font-size: 13px;
  resize: none;
}

/* RIGHT PREVIEW */

#previewPanel {
  background: #20242a;
  border-left: 1px solid #444;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#previewHeader {
  padding: 10px;
  background: #1d2229;
  border-bottom: 1px solid #444;
}

#modelPreview {
  height: 420px;
  border-bottom: 1px solid #444;
}

#animationList {
  max-height: 180px;
  overflow-y: auto;
  padding: 10px;
  border-bottom: 1px solid #444;
}

#assetBrowser {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.assetRow {
  padding: 6px;
  background: #2c323a;
  margin-bottom: 4px;
  cursor: pointer;
  font-size: 12px;
}

.assetRow:hover {
  background: #3d4754;
}

button {
  margin: 4px 4px 4px 0;
  padding: 8px 12px;
  background: #3d4754;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #556170;
}

.animButton {
  display: block;
  width: 100%;
  margin-bottom: 4px;
}

#statusBar {
  padding: 8px;
  background: #16191d;
  border-top: 1px solid #444;
  font-size: 12px;
}
</style>
</head>

<body>

<aside id="sidebar">
  <div id="sidebarHeader">
    <h2>Definitions Studio</h2>
    <button onclick="window.location='/'">Viewer</button>
    <button onclick="window.location='/editor'">World Editor</button>
  </div>

  <div id="tabs"></div>

  <div id="templateActions">
    <button onclick="createTemplate()">New</button>
    <button onclick="duplicateTemplate()">Duplicate</button>
    <button onclick="deleteTemplate()">Delete</button>
    <button onclick="saveDefinitions()">Save</button>
  </div>

  <div id="templateList"></div>
</aside>

<main id="editorPanel">
  <h2 id="editorTitle">Select a template</h2>
  <textarea id="jsonEditor" placeholder="Template JSON will appear here"></textarea>
</main>

<aside id="previewPanel">
  <div id="previewHeader">
    <b>Asset / Animation Preview</b>
  </div>

  <div id="modelPreview"></div>

  <div id="animationList"></div>

  <div id="assetBrowser"></div>

  <div id="statusBar">Ready</div>
</aside>

<script type="module" src="/src/definitions.js"></script>

</body>
</html>
