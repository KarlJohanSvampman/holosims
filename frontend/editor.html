<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Holosims World Editor</title>

<style>

html,
body {
  margin: 0;
  padding: 0;
  overflow: hidden;

  width: 100%;
  height: 100%;

  background: #1b1f24;
  color: white;

  font-family: Arial, sans-serif;
}

/* =========================
   CANVAS
========================= */

#c {
  display: block;
  width: 100vw;
  height: 100vh;
}

/* =========================
   TOP BAR
========================= */

#topbar {

  position: fixed;

  top: 0;
  left: 0;
  right: 0;

  height: 48px;

  background: rgba(20,20,20,0.95);

  display: flex;
  align-items: center;

  padding: 0 10px;

  z-index: 1000;

  border-bottom: 1px solid #444;
}

#topbar button {

  margin-right: 8px;

  padding: 6px 12px;

  background: #3d4754;

  border: none;

  color: white;

  cursor: pointer;
}

#topbar button:hover {
  background: #556170;
}

/* =========================
   SELECTION INFO
========================= */

#editorSelection {

  position: fixed;

  top: 60px;
  left: 10px;

  width: 220px;

  background: rgba(0,0,0,0.85);

  padding: 10px;

  border: 1px solid #444;

  z-index: 999;
}

/* =========================
   INSPECTOR
========================= */

#editorInspector {

  position: fixed;

  top: 60px;
  right: 10px;

  width: 340px;

  max-height: calc(100vh - 80px);

  overflow-y: auto;

  background: rgba(0,0,0,0.92);

  padding: 12px;

  border: 1px solid #444;

  z-index: 999;
}

#editorInspector h3 {
  margin-top: 0;
}

/* =========================
   TOOLBAR
========================= */

#toolPanel {

  position: fixed;

  bottom: 10px;
  left: 10px;

  width: 300px;

  background: rgba(0,0,0,0.85);

  padding: 10px;

  border: 1px solid #444;

  z-index: 999;
}

.toolButton {

  display: inline-block;

  margin: 4px;

  padding: 6px 10px;

  background: #333;

  cursor: pointer;

  border: 1px solid #555;
}

.toolButton:hover {
  background: #444;
}

/* =========================
   STATUS
========================= */

#statusBar {

  position: fixed;

  bottom: 0;
  left: 0;
  right: 0;

  height: 28px;

  background: rgba(15,15,15,0.95);

  border-top: 1px solid #444;

  display: flex;
  align-items: center;

  padding-left: 10px;

  font-size: 12px;

  z-index: 1000;
}

</style>
</head>

<body>

<!-- =========================
     TOPBAR
========================= -->

<div id="topbar">

  <button onclick="saveWorld()">
    Save World
  </button>

  <button onclick="reloadWorld()">
    Reload
  </button>

  <button onclick="window.location='/definitions'">
    Definitions
  </button>

</div>

<!-- =========================
     SELECTION
========================= -->

<div id="editorSelection">

  <b>Selection</b>

  <hr>

  Nothing selected

</div>

<!-- =========================
     INSPECTOR
========================= -->

<div id="editorInspector">

  <h3>Inspector</h3>

  <div id="inspectorContent">

    Nothing selected

  </div>

</div>

<!-- =========================
     TOOL PANEL
========================= -->

<div id="toolPanel">

  <b>Tools</b>

  <hr>

  <div class="toolButton">
    Select
  </div>

  <div class="toolButton">
    Paint Floor
  </div>

  <div class="toolButton">
    Paint Grass
  </div>

  <div class="toolButton">
    Place Prop
  </div>

  <div class="toolButton">
    Spawn Character
  </div>

  <div class="toolButton">
    Road Tool
  </div>

</div>

<!-- =========================
     STATUS BAR
========================= -->

<div id="statusBar">

  World Editor Ready

</div>

<!-- =========================
     MAIN CANVAS
========================= -->

<canvas id="c"></canvas>

<!-- =========================
     WORLD EDITOR APP
========================= -->

<script type="module"
src="src/editor-main.js">
</script>

</body>
</html>
