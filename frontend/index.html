<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Simsland</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; color:#eee; font-family:system-ui, sans-serif; }
    #overlay {backdrop-filter: blur(6px);border: 1px solid rgba(255,255,255,0.1);}    
    #panel { position:absolute; top:10px; right:10px; background:rgba(0,0,0,.72); padding:12px; border-radius:8px; width:350px; max-height:90vh; overflow:auto; font-size:13px; }
    .bubble { position:absolute; transform:translate(-50%,-100%); background:#fff; color:#111; border-radius:12px; padding:4px 8px; font-size:12px; pointer-events:none; max-width:240px; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    .label { position:absolute; transform:translate(-50%,-100%); color:#fff; text-shadow:0 1px 4px #000; font-size:13px; font-weight:700; pointer-events:none; }
    #viewerInspector {

    position: fixed;

    top: 10px;
    right: 10px;

    width: 260px;

    background: rgba(0,0,0,0.85);

    color: white;

    padding: 12px;

    z-index: 9999;

    font-family: monospace;

    border: 1px solid #444;
  }

  </style>
</head>
<body>

<div id="viewerInspector">

  <h3>Inspector</h3>

  <div id="viewerSelection">
    Nothing selected
  </div>

</div>
</div>
  <canvas id="c"></canvas>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
